<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Főoldal</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/index.css" />
        <!--!JavaScript-->
        <script src="../javascript/index.js"></script>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row text-center">
                <form id="etelForm" class="d-flex flex-column w-25">
                    <input type="text" name="nev" placeholder="Név" />
                    <input type="number" name="ar" />
                    <div>
                        <label>
                            Finom
                            <input type="radio" name="finomsag" value="true"/>
                        </label>
                        <label class="d-flex flex-column">
                            Nem Finom
                            <input type="radio" name="finomsag" value="false"/>
                        </label>
                    </div>
                    <input type="date" name="datum">
                    <input type="number" name="mennyiseg">
                    <input type="button" value="Hozzáadás" id="newKaja">
                </form>
            </div>
        </div>
    </body>
</html>
